spring.application.name=28miles

#database
spring.datasource.url=jdbc:postgresql://localhost:5432/28miles
spring.datasource.username=admin
spring.datasource.passwpord=secret

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# API Base Path
server.servlet.context-path=/api/v1.0

# CORS
frontend.url=http://frontend

# Cloudinary
cloudinary.cloud_name=name
cloudinary.api_key=key
cloudinary.api_secret=secret
cloudinary.folder=folder

#Jwt
jwt.secret=supersecret
jwt.expiration=12222222


# Razorpay
razorpay.key.id=key
razorpay.key.secret=secret

# Optional MongoDB datasource
app.mongodb.enabled=true
app.mongodb.uri=mongodb://appuser:app123@localhost:27017/appdb?retryWrites=true&loadBalanced=false&connectTimeoutMS=10000&authSource=appdb&authMechanism=SCRAM-SHA-1
app.mongodb.host=localhost
app.mongodb.port=27017
app.mongodb.database=appdb
app.mongodb.username=appuser
app.mongodb.password=app123

# Optional Kafka
app.kafka.enabled=true
app.kafka.topic=28miles-events
app.kafka.group-id=28miles-group
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=my-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Optional Redis
app.redis.enabled=true
app.redis.ttl-seconds=3600
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Optional AWS S3
app.s3.enabled=true
app.s3.bucket=my-bucket
app.s3.region=us-east-1
app.s3.access-key=test
app.s3.secret-key=test
app.s3.endpoint=http://localhost:4566
app.s3.path-style-access=true

# ============= Feign Client Configuration =============

# Feign Logging
feign.client.config.default.logger-level=FULL
logging.level.com.quodex._miles.feign.client=DEBUG

# Shipping Service Client Configuration
feign.client.config.shipping-service.url=http://localhost:8081
feign.client.config.shipping-service.connectTimeout=5000
feign.client.config.shipping-service.readTimeout=10000
feign.client.config.shipping-service.loggerLevel=FULL

# Payment Gateway Client Configuration
feign.client.config.payment-gateway.url=http://localhost:8082
feign.client.config.payment-gateway.connectTimeout=5000
feign.client.config.payment-gateway.readTimeout=15000
feign.client.config.payment-gateway.loggerLevel=FULL

# Notification Service Client Configuration
feign.client.config.notification-service.url=http://localhost:8083
feign.client.config.notification-service.connectTimeout=3000
feign.client.config.notification-service.readTimeout=5000
feign.client.config.notification-service.loggerLevel=BASIC

